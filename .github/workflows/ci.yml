name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Prepare nested Pi package fixture
        run: |
          PROJECT_DIR="$(mktemp -d)"
          mkdir -p "$PROJECT_DIR/.pi/grill-web"
          rsync -a --exclude .git ./ "$PROJECT_DIR/.pi/grill-web/"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
      - run: npm ci
        working-directory: ${{ env.PROJECT_DIR }}/.pi/grill-web
      - run: make smoke
        working-directory: ${{ env.PROJECT_DIR }}/.pi/grill-web
